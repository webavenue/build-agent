name: Unity Build (Reusable)

# ─────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW — called by individual Unity project repos.
# Do not trigger this directly. Each project has its own
# thin build.yml that calls this with project-specific inputs.
#
# Secrets are inherited from the calling repo — nothing
# sensitive lives here.
#
# Unity builds always upload (no build-only mode).
# Android → Google Play. iOS → TestFlight.
#
# VERSIONING
#   Project holds the marketing version as X.Y in ProjectSettings
#   (bundleVersion). CI appends github.run_number to produce the
#   full version string (X.Y.run_number) and uses (offset + run_number)
#   as the integer build/version code. Bump X.Y in the Unity project
#   when cutting a new feature version.
# ─────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      build_android:
        type: boolean
        required: false
        default: true
      build_ios:
        type: boolean
        required: false
        default: true
      do_asana:
        type: boolean
        required: false
        default: true
      do_slack:
        type: boolean
        required: false
        default: true
      release_notes:
        type: string
        required: false
        default: 'Bug fixes and performance improvements.'
      version_code_offset:
        description: 'Added to github.run_number to produce the build/version code. Set per-project so codes never collide with previously uploaded builds.'
        type: number
        required: false
        default: 100

# ─────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────
  # ANDROID
  # ───────────────────────────────────────────────────────────
  android:
    name: Build & Upload Android
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest

    steps:

      # Unity's Docker image (~15 GB) + Library + build output is tight on
      # ubuntu-latest's ~14 GB of free space. Strip unused toolchains up front.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Detect Unity version
        id: unity
        run: |
          VERSION=$(grep "^m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Unity version: $VERSION"

      # Project holds X.Y; CI appends github.run_number. Fail fast if the
      # project's bundleVersion isn't exactly X.Y (TestFlight requires
      # CFBundleShortVersionString to be ≤ 3 dot-separated segments).
      - name: Read & validate project version
        id: base_version
        run: |
          BASE=$(grep "^  bundleVersion:" ProjectSettings/ProjectSettings.asset | awk '{print $2}')
          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::ProjectSettings bundleVersion must be X.Y format (got '$BASE'). Update it in the Unity project."
            exit 1
          fi
          FULL="${BASE}.${{ github.run_number }}"
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "Project version: $BASE + runner ${{ github.run_number }} → $FULL"

      - name: Compute version code
        id: version
        run: |
          CODE=$((${{ inputs.version_code_offset }} + ${{ github.run_number }}))
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Version code will be: $CODE"

      # Patch ProjectSettings.asset in-place so Unity builds with the CI-driven
      # versions. bundleVersion = marketing string (shared across platforms).
      # AndroidBundleVersionCode = integer Play Store version code.
      - name: Patch version in ProjectSettings
        run: |
          sed -i "s/^  bundleVersion: .*/  bundleVersion: ${{ steps.base_version.outputs.full }}/" ProjectSettings/ProjectSettings.asset
          sed -i "s/^  AndroidBundleVersionCode: .*/  AndroidBundleVersionCode: ${{ steps.version.outputs.code }}/" ProjectSettings/ProjectSettings.asset
          echo "✓ bundleVersion           → ${{ steps.base_version.outputs.full }}"
          echo "✓ AndroidBundleVersionCode → ${{ steps.version.outputs.code }}"

      # Library folder holds Unity's imported-asset cache. Cold build re-imports
      # everything (10–20+ min extra). Key on asset/package/settings hashes so
      # unrelated source edits don't invalidate the cache.
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      # unity-builder pulls the Unity Editor Docker image matching the project's
      # Unity version, activates the Pro license via serial, and runs the build.
      # Signing happens inside Unity's Gradle using the passed keystore.
      - name: Build Android (.aab)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ steps.unity.outputs.version }}
          targetPlatform: Android
          androidExportType: androidAppBundle
          androidKeystoreName: release.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          androidKeyaliasName: ${{ vars.ANDROID_KEYSTORE_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_PASSWORD }}
          allowDirtyBuild: true

      - name: Set up Ruby 3.1.6
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.6'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane -v 2.226.0 --no-document

      - name: Decode Google Play key
        run: |
          mkdir -p ci-certs
          echo "${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}" | base64 -d > ci-certs/google-play-key.json

      - name: Write release notes
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          NOTES="${RELEASE_NOTES}"
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements."
          fi
          echo "$NOTES" > fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.code }}.txt
          echo "✓ Release notes written"

      - name: Upload to Play Store
        env:
          ANDROID_PACKAGE_NAME: ${{ vars.ANDROID_PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ github.workspace }}/ci-certs/google-play-key.json
          GOOGLE_PLAY_TRACK: ${{ vars.GOOGLE_PLAY_TRACK }}
        run: |
          fastlane supply \
            --aab build/Android/Android.aab \
            --package_name "${ANDROID_PACKAGE_NAME}" \
            --json_key "${GOOGLE_PLAY_JSON_KEY_PATH}" \
            --track "${GOOGLE_PLAY_TRACK}" \
            --metadata_path fastlane/metadata/android \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true


  # ───────────────────────────────────────────────────────────
  # iOS — Stage 1: Unity → Xcode project (Linux)
  # ───────────────────────────────────────────────────────────
  ios-build:
    name: Build iOS Xcode Project
    if: ${{ inputs.build_ios }}
    runs-on: ubuntu-latest

    outputs:
      version_full: ${{ steps.base_version.outputs.full }}
      version_code: ${{ steps.version.outputs.code }}

    steps:

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true      # don't need Android SDK for iOS builds
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Detect Unity version
        id: unity
        run: |
          VERSION=$(grep "^m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Unity version: $VERSION"

      - name: Read & validate project version
        id: base_version
        run: |
          BASE=$(grep "^  bundleVersion:" ProjectSettings/ProjectSettings.asset | awk '{print $2}')
          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::ProjectSettings bundleVersion must be X.Y format (got '$BASE'). Update it in the Unity project."
            exit 1
          fi
          FULL="${BASE}.${{ github.run_number }}"
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "Project version: $BASE + runner ${{ github.run_number }} → $FULL"

      - name: Compute version code
        id: version
        run: |
          CODE=$((${{ inputs.version_code_offset }} + ${{ github.run_number }}))
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Version code will be: $CODE"

      # iOS build number lives in buildNumber.iPhone in ProjectSettings.asset.
      # sed range limits substitution to inside the buildNumber: block so we
      # don't accidentally touch unrelated iPhone: keys elsewhere in the file.
      - name: Patch version in ProjectSettings
        run: |
          sed -i "s/^  bundleVersion: .*/  bundleVersion: ${{ steps.base_version.outputs.full }}/" ProjectSettings/ProjectSettings.asset
          sed -i "/^  buildNumber:/,/^  [^[:space:]]/{s/^    iPhone: .*/    iPhone: \"${{ steps.version.outputs.code }}\"/}" ProjectSettings/ProjectSettings.asset
          echo "✓ bundleVersion         → ${{ steps.base_version.outputs.full }}"
          echo "✓ buildNumber.iPhone    → ${{ steps.version.outputs.code }}"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Build iOS (Xcode project export)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ steps.unity.outputs.version }}
          targetPlatform: iOS
          allowDirtyBuild: true

      # Hand the exported Xcode project off to the macOS job.
      # retention-days: 1 because we only need it for the immediate upload job.
      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS/
          retention-days: 1
          if-no-files-found: error


  # ───────────────────────────────────────────────────────────
  # iOS — Stage 2: Archive & TestFlight upload (macOS)
  # ───────────────────────────────────────────────────────────
  ios-upload:
    name: Archive & Upload iOS
    if: ${{ inputs.build_ios }}
    needs: ios-build
    runs-on: macos-15

    steps:

      - name: Set up Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Set up Ruby 3.1.6
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.6'
          bundler-cache: false

      - name: Install Fastlane + CocoaPods
        run: |
          gem install fastlane -v 2.226.0 --no-document
          gem install cocoapods -v 1.16.2 --no-document
          pod --version

      - name: Download Xcode project artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS/

      - name: Decode Apple API key
        run: |
          mkdir -p ci-certs
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 -d > ci-certs/apple-api-key.p8

      - name: Decode Distribution Certificate
        run: |
          echo "${{ secrets.APPLE_DIST_CERT_BASE64 }}" | base64 -d > ci-certs/dist-cert.p12

      - name: Decode Provisioning Profile
        run: |
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ci-certs/profile.mobileprovision

      - name: Install Certificate into Keychain
        env:
          CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security list-keychain -d user -s build.keychain $(security list-keychain -d user | sed s/\"//g)
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          security import ci-certs/dist-cert.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          echo "✓ Certificate installed into build.keychain"

      - name: Install Provisioning Profile
        id: profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i ci-certs/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(plutil -extract UUID raw /tmp/profile.plist)
          PROFILE_NAME=$(plutil -extract Name raw /tmp/profile.plist)
          cp ci-certs/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "profile_name=$PROFILE_NAME" >> $GITHUB_OUTPUT
          echo "✓ Profile installed: $PROFILE_NAME ($PROFILE_UUID)"

      # Some Unity SDKs (Firebase, Facebook, Google Play Games) inject a
      # Podfile via External Dependency Manager. If present, install pods
      # and archive from the workspace. Otherwise use the xcodeproj directly.
      - name: Install CocoaPods dependencies (if Podfile exists)
        id: pods
        working-directory: build/iOS
        run: |
          if [ -f Podfile ]; then
            pod install
            echo "has_workspace=true" >> $GITHUB_OUTPUT
            echo "✓ Pods installed"
          else
            echo "has_workspace=false" >> $GITHUB_OUTPUT
            echo "No Podfile — using xcodeproj directly"
          fi

      - name: Archive Xcode project
        working-directory: build/iOS
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          IOS_SCHEME: ${{ vars.IOS_SCHEME }}
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
        run: |
          if [ "${{ steps.pods.outputs.has_workspace }}" = "true" ]; then
            PROJECT_ARG="-workspace Unity-iPhone.xcworkspace"
          else
            PROJECT_ARG="-project Unity-iPhone.xcodeproj"
          fi

          xcodebuild $PROJECT_ARG \
            -scheme "${IOS_SCHEME}" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/archive.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive
          echo "✓ Archive created"

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}
        run: |
          cat > ci-certs/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/archive.xcarchive" \
            -exportOptionsPlist ci-certs/ExportOptions.plist \
            -exportPath "${{ github.workspace }}/build/export"
          echo "✓ IPA exported"
          ls -la "${{ github.workspace }}/build/export/"

      # Fastlane pilot accepts the ASC API key as a JSON file containing
      # key_id, issuer_id, and the raw p8 contents. jq handles the escaping.
      - name: Build ASC API key JSON
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          jq -n \
            --arg key_id "${APPLE_API_KEY_ID}" \
            --arg issuer_id "${APPLE_API_ISSUER_ID}" \
            --rawfile key ci-certs/apple-api-key.p8 \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > ci-certs/asc-api-key.json
          echo "✓ ASC API key JSON written"

      - name: Upload to TestFlight
        env:
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_GROUPS }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          IPA_PATH=$(find "${{ github.workspace }}/build/export" -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa file found in build/export/"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"

          if [ -n "$TESTFLIGHT_GROUPS" ]; then
            fastlane pilot upload \
              --api_key_path ci-certs/asc-api-key.json \
              --ipa "$IPA_PATH" \
              --changelog "$RELEASE_NOTES" \
              --distribute_external true \
              --groups "$TESTFLIGHT_GROUPS" \
              --skip_submission true \
              --skip_waiting_for_build_processing true
          else
            fastlane pilot upload \
              --api_key_path ci-certs/asc-api-key.json \
              --ipa "$IPA_PATH" \
              --changelog "$RELEASE_NOTES" \
              --skip_submission true \
              --skip_waiting_for_build_processing true
          fi
