name: External Build Notify (fetch versions + changelog + Asana + Slack + tag)

# ─────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW — for projects where an EXTERNAL studio
# builds and uploads to Play Store + TestFlight, and we only
# generate the changelog + QA artefacts afterward.
#
# Flow:
#   1. fetch-versions job: query Google Play (internal track) +
#      App Store Connect (latest TestFlight build) to learn what
#      versions the external CI just shipped. Validates X.Y.Z
#      format and fails the workflow if either is malformed.
#   2. notify job: delegates to notify.yml (changelog generation,
#      Asana tasks, Slack message, build/* tag push).
#
# Caller usage (from a project repo):
#
#   on:
#     workflow_dispatch:
#       inputs:
#         release_notes:
#           description: 'Fallback release notes (used only if no commits in range)'
#           required: false
#           default: ''
#   permissions:
#     contents: write
#   jobs:
#     changelog:
#       uses: webavenue/build-agent/.github/workflows/external-notify.yml@main
#       with:
#         branch:                ${{ github.ref_name }}
#         project_name:          Colorwood Associations
#         app_name:               Colorwood Associations
#         android_package_name:   ${{ vars.ANDROID_PACKAGE_NAME }}
#         ios_bundle_id:          ${{ vars.IOS_BUNDLE_ID }}
#         release_notes_override: ${{ inputs.release_notes }}
#       secrets: inherit
#
# Required secrets on caller repo:
#   ANTHROPIC_API_KEY                — Claude API key (for changelog generation)
#   GOOGLE_PLAY_JSON_KEY_BASE64      — base64 of service-account JSON
#   APPLE_API_KEY_BASE64             — base64 of .p8 file
#   APPLE_API_KEY_ID                 — ASC key id (10 chars)
#   APPLE_API_ISSUER_ID              — ASC issuer id (UUID)
#   ASANA_ACCESS_TOKEN, SLACK_BOT_TOKEN
#
# Required vars on caller repo:
#   ANDROID_PACKAGE_NAME, IOS_BUNDLE_ID  (referenced by caller; passed as inputs)
#   ASANA_TASK_LABEL, ASANA_QA_PROJECT_ID, ASANA_PROJECT_ID,
#   ASANA_ASSIGNEE_ID, ASANA_COLLABORATOR_IDS  (read directly by notify.yml)
#   SLACK_CHANNEL_ID  (read directly by notify.yml)
# ─────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch the workflow ran on — used as the changelog range end + tag SHA.'
        type: string
        required: true
      project_name:
        description: 'Full display name passed into the LLM prompt.'
        type: string
        required: true
      app_name:
        description: 'Short app name used in the Slack header.'
        type: string
        required: true
      android_package_name:
        description: 'Android applicationId for Google Play lookup.'
        type: string
        required: true
      ios_bundle_id:
        description: 'iOS bundle id for App Store Connect lookup.'
        type: string
        required: true
      android_track:
        description: 'Google Play track to read (latest version comes from here).'
        type: string
        required: false
        default: 'internal'
      release_notes_override:
        description: 'Used only when LLM yields no notes (empty commit range or LLM error).'
        type: string
        required: false
        default: ''
      do_asana:
        type: boolean
        required: false
        default: true
      do_slack:
        type: boolean
        required: false
        default: true
      android_download_url:
        type: string
        required: false
        default: ''
      high_risk_paths:
        description: 'Newline-separated repo paths that auto-mark risk=high in the LLM prompt.'
        type: string
        required: false
        default: ''
      ignore_paths:
        description: 'Newline-separated repo paths filtered out of PR file lists.'
        type: string
        required: false
        default: ''
      extra_qa_hint:
        description: 'Free-form note appended to the LLM prompt.'
        type: string
        required: false
        default: ''
      build_agent_ref:
        description: 'Ref of build-agent repo to pull scripts from. Pin for stability.'
        type: string
        required: false
        default: 'main'

jobs:

  # ───────────────────────────────────────────────────────────
  # FETCH — query Play + TestFlight for the latest shipped
  # versions. No build keys / mac mini needed — pure API work,
  # runs on github-hosted ubuntu.
  # ───────────────────────────────────────────────────────────
  fetch-versions:
    name: Fetch versions from stores
    runs-on: ubuntu-latest
    outputs:
      android_version_full: ${{ steps.versions.outputs.android_version_full }}
      android_version_code: ${{ steps.versions.outputs.android_version_code }}
      ios_version_full:     ${{ steps.versions.outputs.ios_version_full }}
      ios_version_code:     ${{ steps.versions.outputs.ios_version_code }}
    steps:
      - name: Checkout build-agent scripts
        uses: actions/checkout@v4
        with:
          repository: webavenue/build-agent
          ref: ${{ inputs.build_agent_ref }}
          path: .build-agent

      - name: Install Python deps
        run: pip install --quiet "pyjwt[crypto]"

      - name: Decode Apple API key
        env:
          API_KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ci-certs
          echo "$API_KEY_B64" | base64 -d > ci-certs/apple-api-key.p8
          chmod 600 ci-certs/apple-api-key.p8

      - name: Decode Google Play key
        env:
          KEY_B64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          mkdir -p ci-certs
          echo "$KEY_B64" | base64 -d > ci-certs/google-play-key.json
          chmod 600 ci-certs/google-play-key.json

      - name: Fetch latest versions
        id: versions
        env:
          ANDROID_PACKAGE_NAME:       ${{ inputs.android_package_name }}
          ANDROID_TRACK:              ${{ inputs.android_track }}
          GOOGLE_PLAY_JSON_KEY_PATH:  ci-certs/google-play-key.json
          IOS_BUNDLE_ID:              ${{ inputs.ios_bundle_id }}
          APPLE_API_KEY_ID:           ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID:        ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_PATH:         ci-certs/apple-api-key.p8
        run: python3 .build-agent/scripts/fetch-store-versions.py

      - name: Clean up decoded keys
        if: always()
        run: rm -rf ci-certs

  # ───────────────────────────────────────────────────────────
  # NOTIFY — delegate to notify.yml. Same-repo relative ref
  # resolves to the same ref the caller used for this workflow.
  # ───────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: fetch-versions
    uses: ./.github/workflows/notify.yml
    with:
      branch:                 ${{ inputs.branch }}
      project_name:           ${{ inputs.project_name }}
      app_name:               ${{ inputs.app_name }}
      android_version_full:   ${{ needs.fetch-versions.outputs.android_version_full }}
      android_version_code:   ${{ needs.fetch-versions.outputs.android_version_code }}
      ios_version_full:       ${{ needs.fetch-versions.outputs.ios_version_full }}
      ios_version_code:       ${{ needs.fetch-versions.outputs.ios_version_code }}
      release_notes_override: ${{ inputs.release_notes_override }}
      do_asana:               ${{ inputs.do_asana }}
      do_slack:               ${{ inputs.do_slack }}
      android_download_url:   ${{ inputs.android_download_url }}
      high_risk_paths:        ${{ inputs.high_risk_paths }}
      ignore_paths:           ${{ inputs.ignore_paths }}
      extra_qa_hint:          ${{ inputs.extra_qa_hint }}
      build_agent_ref:        ${{ inputs.build_agent_ref }}
    secrets: inherit
