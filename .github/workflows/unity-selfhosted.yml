name: Unity Build (Self-Hosted Mac)

# ─────────────────────────────────────────────────────────────
# REUSABLE WORKFLOW — runs Unity Android + iOS builds on a
# self-hosted macOS runner (e.g. an office Mac mini).
#
# Differences vs unity.yml (the GitHub-hosted version):
#   - Calls Unity Editor natively (no Docker / game-ci action)
#   - One iOS job (no Linux→macOS artifact handoff)
#   - Unity Library cache persists in workspace between runs
#   - License activated once on the Mac (not per-run via secrets)
#   - Requires Builder.cs in Assets/Editor/ of the Unity project
#
# Each Unity project repo registers its own runner with labels
# matching `runner_labels`. The `flock` lock ensures only one
# Unity Editor instance runs at a time on the mini, even when
# multiple repos call this workflow concurrently.
# ─────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      build_android:
        type: boolean
        required: false
        default: true
      build_ios:
        type: boolean
        required: false
        default: true
      do_asana:
        type: boolean
        required: false
        default: true
      do_slack:
        type: boolean
        required: false
        default: true
      release_notes:
        type: string
        required: false
        default: 'Bug fixes and performance improvements.'
      version_code_offset:
        description: 'Added to github.run_number to produce the build/version code.'
        type: number
        required: false
        default: 100
      pre_build_cleanup:
        description: 'Newline-separated asset paths to delete before the Unity build runs. Matching .meta files are also removed.'
        type: string
        required: false
        default: ''
      runner_labels:
        description: 'JSON array of self-hosted runner labels.'
        type: string
        required: false
        default: '["self-hosted","macOS","unity"]'

jobs:

  # ───────────────────────────────────────────────────────────
  # ANDROID
  # ───────────────────────────────────────────────────────────
  android:
    name: Build & Upload Android
    if: ${{ inputs.build_android }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    concurrency:
      group: unity-mac-mini-${{ github.repository }}
      cancel-in-progress: false

    outputs:
      version_full: ${{ steps.base_version.outputs.full }}
      version_code: ${{ steps.base_version.outputs.code }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      # Self-hosted workspace persists. Reset tracked files (undo previous
      # ProjectSettings sed) but keep Library/ and build/ to retain caches.
      - name: Reset working tree (preserve Library cache)
        run: |
          git reset --hard HEAD
          git clean -ffdx -e Library/ -e build/ -e ci-certs/ -e Temp/

      - name: Pre-build cleanup
        if: inputs.pre_build_cleanup != ''
        env:
          CLEANUP_PATHS: ${{ inputs.pre_build_cleanup }}
        run: |
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              rm -rf "$path"
              [ -e "${path}.meta" ] && rm -f "${path}.meta"
              echo "✓ Removed: $path"
            else
              echo "⚠ Not found (skipping): $path"
            fi
          done <<< "$CLEANUP_PATHS"

      - name: Detect Unity version
        id: unity
        run: |
          VERSION=$(grep "^m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          UNITY_PATH="/Applications/Unity/Hub/Editor/${VERSION}/Unity.app/Contents/MacOS/Unity"
          if [ ! -x "$UNITY_PATH" ]; then
            echo "::error::Unity ${VERSION} not installed at ${UNITY_PATH}. Install via Unity Hub on the runner machine."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "path=$UNITY_PATH" >> $GITHUB_OUTPUT
          echo "Detected Unity version: $VERSION"

      - name: Read & validate project version
        id: base_version
        run: |
          BASE=$(grep "^  bundleVersion:" ProjectSettings/ProjectSettings.asset | awk '{print $2}')
          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::ProjectSettings bundleVersion must be X.Y format (got '$BASE')."
            exit 1
          fi
          CODE=$((${{ inputs.version_code_offset }} + ${{ github.run_number }}))
          FULL="${BASE}.${CODE}"
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Project version: $BASE + code $CODE → $FULL"

      - name: Compute version code
        id: version
        run: |
          CODE=${{ steps.base_version.outputs.code }}
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Version code: $CODE"

      # macOS sed needs `-i ''` (BSD syntax). Linux uses `-i`.
      - name: Patch version in ProjectSettings
        run: |
          sed -i '' "s/^  bundleVersion: .*/  bundleVersion: ${{ steps.base_version.outputs.full }}/" ProjectSettings/ProjectSettings.asset
          sed -i '' "s/^  AndroidBundleVersionCode: .*/  AndroidBundleVersionCode: ${{ steps.version.outputs.code }}/" ProjectSettings/ProjectSettings.asset
          echo "✓ bundleVersion           → ${{ steps.base_version.outputs.full }}"
          echo "✓ AndroidBundleVersionCode → ${{ steps.version.outputs.code }}"

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ci-certs
          echo "$KS_B64" | base64 -d > ci-certs/release.keystore

      # flock serializes Unity Editor invocations across all repos sharing
      # this Mac mini — Unity license + Editor is single-instance per machine.
      - name: Build Android (.aab)
        env:
          UNITY_PATH: ${{ steps.unity.outputs.path }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ vars.ANDROID_KEYSTORE_ALIAS }}
        run: |
          mkdir -p build/Android
          flock /tmp/unity-mac-mini.lock \
            "$UNITY_PATH" \
              -batchmode \
              -quit \
              -nographics \
              -projectPath "$GITHUB_WORKSPACE" \
              -buildTarget Android \
              -executeMethod Builder.BuildAndroid \
              -logFile - \
              -keystorePath "$GITHUB_WORKSPACE/ci-certs/release.keystore" \
              -keystorePass "$KEYSTORE_PASS" \
              -keyaliasName "$KEY_ALIAS" \
              -keyaliasPass "$KEY_PASS"

      - name: Decode Google Play key
        env:
          KEY_B64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          echo "$KEY_B64" | base64 -d > ci-certs/google-play-key.json

      - name: Write release notes
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          NOTES="${RELEASE_NOTES:-Bug fixes and performance improvements.}"
          echo "$NOTES" > fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.code }}.txt

      - name: Upload to Play Store
        env:
          ANDROID_PACKAGE_NAME: ${{ vars.ANDROID_PACKAGE_NAME }}
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ github.workspace }}/ci-certs/google-play-key.json
          GOOGLE_PLAY_TRACK: ${{ vars.GOOGLE_PLAY_TRACK }}
        run: |
          fastlane supply \
            --aab build/Android/Android.aab \
            --package_name "${ANDROID_PACKAGE_NAME}" \
            --json_key "${GOOGLE_PLAY_JSON_KEY_PATH}" \
            --track "${GOOGLE_PLAY_TRACK}" \
            --metadata_path fastlane/metadata/android \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -rf ci-certs


  # ───────────────────────────────────────────────────────────
  # iOS — single job: Unity export → archive → TestFlight
  # ───────────────────────────────────────────────────────────
  ios:
    name: Build & Upload iOS
    if: ${{ inputs.build_ios }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    concurrency:
      group: unity-mac-mini-${{ github.repository }}
      cancel-in-progress: false

    outputs:
      version_full: ${{ steps.base_version.outputs.full }}
      version_code: ${{ steps.base_version.outputs.code }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      - name: Reset working tree (preserve Library cache)
        run: |
          git reset --hard HEAD
          git clean -ffdx -e Library/ -e build/ -e ci-certs/ -e Temp/

      - name: Pre-build cleanup
        if: inputs.pre_build_cleanup != ''
        env:
          CLEANUP_PATHS: ${{ inputs.pre_build_cleanup }}
        run: |
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              rm -rf "$path"
              [ -e "${path}.meta" ] && rm -f "${path}.meta"
              echo "✓ Removed: $path"
            else
              echo "⚠ Not found (skipping): $path"
            fi
          done <<< "$CLEANUP_PATHS"

      - name: Detect Unity version
        id: unity
        run: |
          VERSION=$(grep "^m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          UNITY_PATH="/Applications/Unity/Hub/Editor/${VERSION}/Unity.app/Contents/MacOS/Unity"
          if [ ! -x "$UNITY_PATH" ]; then
            echo "::error::Unity ${VERSION} not installed at ${UNITY_PATH}. Install via Unity Hub on the runner machine."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "path=$UNITY_PATH" >> $GITHUB_OUTPUT

      - name: Read & validate project version
        id: base_version
        run: |
          BASE=$(grep "^  bundleVersion:" ProjectSettings/ProjectSettings.asset | awk '{print $2}')
          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::ProjectSettings bundleVersion must be X.Y format (got '$BASE')."
            exit 1
          fi
          CODE=$((${{ inputs.version_code_offset }} + ${{ github.run_number }}))
          FULL="${BASE}.${CODE}"
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Project version: $BASE + code $CODE → $FULL"

      - name: Compute version code
        id: version
        run: |
          CODE=${{ steps.base_version.outputs.code }}
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Patch version in ProjectSettings
        run: |
          sed -i '' "s/^  bundleVersion: .*/  bundleVersion: ${{ steps.base_version.outputs.full }}/" ProjectSettings/ProjectSettings.asset
          sed -i '' "/^  buildNumber:/,/^  [^[:space:]]/{s/^    iPhone: .*/    iPhone: \"${{ steps.version.outputs.code }}\"/;}" ProjectSettings/ProjectSettings.asset
          echo "✓ bundleVersion         → ${{ steps.base_version.outputs.full }}"
          echo "✓ buildNumber.iPhone    → ${{ steps.version.outputs.code }}"

      - name: Build iOS (Xcode project export)
        env:
          UNITY_PATH: ${{ steps.unity.outputs.path }}
        run: |
          rm -rf build/iOS
          flock /tmp/unity-mac-mini.lock \
            "$UNITY_PATH" \
              -batchmode \
              -quit \
              -nographics \
              -projectPath "$GITHUB_WORKSPACE" \
              -buildTarget iOS \
              -executeMethod Builder.BuildIOS \
              -logFile -

      # Unlock the login keychain so xcodebuild can read the Apple
      # Distribution cert that Xcode added when you signed into your
      # Apple ID. Without this, xcodebuild fails with "User interaction
      # is not allowed" because launchd-spawned jobs can't prompt.
      - name: Unlock login keychain
        env:
          MAC_LOGIN_PASSWORD: ${{ secrets.MAC_LOGIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$MAC_LOGIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          # Allow codesign/xcodebuild to use signing keys without further prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_LOGIN_PASSWORD" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

      # API key is still needed for fastlane TestFlight upload.
      # Cert + provisioning profile are NOT decoded here — automatic
      # signing on the mini uses the Apple ID signed into Xcode.
      - name: Decode Apple API key
        env:
          API_KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ci-certs
          echo "$API_KEY_B64" | base64 -d > ci-certs/apple-api-key.p8

      - name: Install CocoaPods (if Podfile exists)
        id: pods
        working-directory: build/iOS
        run: |
          if [ -f Podfile ]; then
            pod install
            echo "has_workspace=true" >> $GITHUB_OUTPUT
          else
            echo "has_workspace=false" >> $GITHUB_OUTPUT
          fi

      # Automatic signing: Xcode picks the right cert + profile from the
      # Apple ID signed into Xcode on the mini, and auto-syncs capabilities
      # (IAP, Push, etc.) based on the app's entitlements.
      # -allowProvisioningUpdates lets Xcode talk to Apple to refresh profiles.
      - name: Archive Xcode project
        working-directory: build/iOS
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          IOS_SCHEME: ${{ vars.IOS_SCHEME }}
        run: |
          rm -rf "${{ github.workspace }}/build/archive.xcarchive"
          if [ "${{ steps.pods.outputs.has_workspace }}" = "true" ]; then
            PROJECT_ARG="-workspace Unity-iPhone.xcworkspace"
          else
            PROJECT_ARG="-project Unity-iPhone.xcodeproj"
          fi

          xcodebuild $PROJECT_ARG \
            -scheme "${IOS_SCHEME}" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/archive.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          rm -rf "${{ github.workspace }}/build/export"
          cat > ci-certs/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/archive.xcarchive" \
            -exportOptionsPlist ci-certs/ExportOptions.plist \
            -exportPath "${{ github.workspace }}/build/export" \
            -allowProvisioningUpdates

      # Upload the IPA as a workflow artifact so we can compare against
      # a locally-built IPA when debugging Apple validation issues.
      - name: Upload IPA artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.base_version.outputs.code }}
          path: build/export/*.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Build ASC API key JSON
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          jq -n \
            --arg key_id "${APPLE_API_KEY_ID}" \
            --arg issuer_id "${APPLE_API_ISSUER_ID}" \
            --rawfile key ci-certs/apple-api-key.p8 \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > ci-certs/asc-api-key.json

      # Skipping --changelog and --distribute_external on purpose. Both
      # would force fastlane to wait for the build to appear in App
      # Store Connect (10–30 min), which holds the Mac mini's concurrency
      # lock for that whole window. Release notes go out via Slack;
      # TestFlight tester groups can be assigned via the ASC web UI.
      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find "${{ github.workspace }}/build/export" -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No .ipa file found in build/export/"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"

          fastlane pilot upload \
            --api_key_path ci-certs/asc-api-key.json \
            --ipa "$IPA_PATH" \
            --skip_submission true \
            --skip_waiting_for_build_processing true

      # Decoded API key is the only sensitive file. Build outputs kept for debugging.
      - name: Clean up
        if: always()
        run: |
          rm -rf ci-certs


  # ───────────────────────────────────────────────────────────
  # NOTIFY — Asana QA tasks + Slack message
  # Runs on GitHub-hosted Ubuntu (just makes API calls, no need
  # to occupy the Mac mini).
  # ───────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: [android, ios]
    if: >
      always() &&
      (needs.android.result != 'skipped' || needs.ios.result != 'skipped') &&
      (inputs.do_slack || inputs.do_asana)
    runs-on: ubuntu-latest

    steps:

      # Either job's outputs work — they compute the same version. Prefer
      # android's; fall back to ios when only iOS ran.
      - name: Resolve version
        id: version
        run: |
          FULL="${{ needs.android.outputs.version_full }}"
          CODE="${{ needs.android.outputs.version_code }}"
          if [ -z "$FULL" ]; then
            FULL="${{ needs.ios.outputs.version_full }}"
            CODE="${{ needs.ios.outputs.version_code }}"
          fi
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Resolved: $FULL ($CODE)"

      - name: Create Android Asana QA task
        id: asana_android
        if: needs.android.result == 'success' && inputs.do_asana
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_TASK_LABEL: ${{ vars.ASANA_TASK_LABEL }}
          ASANA_QA_PROJECT_ID: ${{ vars.ASANA_QA_PROJECT_ID }}
          ASANA_PROJECT_ID: ${{ vars.ASANA_PROJECT_ID }}
          ASANA_ASSIGNEE_ID: ${{ vars.ASANA_ASSIGNEE_ID }}
          ASANA_COLLABORATOR_IDS: ${{ vars.ASANA_COLLABORATOR_IDS }}
          VERSION_FULL: ${{ steps.version.outputs.full }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TASK_NAME="[Build] ${ASANA_TASK_LABEL} | [Android] ${VERSION_CODE}(${VERSION_FULL}) QA"
          echo "Creating Asana task: $TASK_NAME"

          if [ -n "$ASANA_PROJECT_ID" ]; then
            PROJECTS="[\"${ASANA_QA_PROJECT_ID}\", \"${ASANA_PROJECT_ID}\"]"
          else
            PROJECTS="[\"${ASANA_QA_PROJECT_ID}\"]"
          fi

          TASK_RESPONSE=$(curl -s -X POST "https://app.asana.com/api/1.0/tasks" \
            -H "Authorization: Bearer ${ASANA_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"data\": {
                \"name\": \"${TASK_NAME}\",
                \"notes\": \"Branch: ${BRANCH}\n\nRelease Notes:\n${RELEASE_NOTES}\",
                \"projects\": ${PROJECTS},
                \"assignee\": \"${ASANA_ASSIGNEE_ID}\"
              }
            }")

          echo "Asana response: $TASK_RESPONSE"
          TASK_GID=$(echo "$TASK_RESPONSE" | jq -r '.data.gid // empty')

          if [ -z "$TASK_GID" ]; then
            echo "⚠ Failed to create Android Asana task. Response: $TASK_RESPONSE"
            echo "task_url=" >> $GITHUB_OUTPUT
          else
            TASK_URL="https://app.asana.com/0/${ASANA_QA_PROJECT_ID}/${TASK_GID}"
            echo "✓ Android Asana task created: ${TASK_URL}"
            echo "task_url=${TASK_URL}" >> $GITHUB_OUTPUT

            if [ -n "$ASANA_COLLABORATOR_IDS" ]; then
              IFS=',' read -ra COLLABS <<< "$ASANA_COLLABORATOR_IDS"
              FOLLOWERS_JSON=$(printf '"%s",' "${COLLABS[@]}" | sed 's/,$//')
              curl -s -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/addFollowers" \
                -H "Authorization: Bearer ${ASANA_ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"data\": {\"followers\": [${FOLLOWERS_JSON}]}}" > /dev/null
              echo "✓ Collaborators added"
            fi
          fi

      - name: Create iOS Asana QA task
        id: asana_ios
        if: needs.ios.result == 'success' && inputs.do_asana
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_TASK_LABEL: ${{ vars.ASANA_TASK_LABEL }}
          ASANA_QA_PROJECT_ID: ${{ vars.ASANA_QA_PROJECT_ID }}
          ASANA_PROJECT_ID: ${{ vars.ASANA_PROJECT_ID }}
          ASANA_ASSIGNEE_ID: ${{ vars.ASANA_ASSIGNEE_ID }}
          ASANA_COLLABORATOR_IDS: ${{ vars.ASANA_COLLABORATOR_IDS }}
          VERSION_FULL: ${{ steps.version.outputs.full }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TASK_NAME="[Build] ${ASANA_TASK_LABEL} | [iOS] ${VERSION_CODE}(${VERSION_FULL}) QA"
          echo "Creating Asana task: $TASK_NAME"

          if [ -n "$ASANA_PROJECT_ID" ]; then
            PROJECTS="[\"${ASANA_QA_PROJECT_ID}\", \"${ASANA_PROJECT_ID}\"]"
          else
            PROJECTS="[\"${ASANA_QA_PROJECT_ID}\"]"
          fi

          TASK_RESPONSE=$(curl -s -X POST "https://app.asana.com/api/1.0/tasks" \
            -H "Authorization: Bearer ${ASANA_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"data\": {
                \"name\": \"${TASK_NAME}\",
                \"notes\": \"Branch: ${BRANCH}\n\nRelease Notes:\n${RELEASE_NOTES}\",
                \"projects\": ${PROJECTS},
                \"assignee\": \"${ASANA_ASSIGNEE_ID}\"
              }
            }")

          echo "Asana response: $TASK_RESPONSE"
          TASK_GID=$(echo "$TASK_RESPONSE" | jq -r '.data.gid // empty')

          if [ -z "$TASK_GID" ]; then
            echo "⚠ Failed to create iOS Asana task. Response: $TASK_RESPONSE"
            echo "task_url=" >> $GITHUB_OUTPUT
          else
            TASK_URL="https://app.asana.com/0/${ASANA_QA_PROJECT_ID}/${TASK_GID}"
            echo "✓ iOS Asana task created: ${TASK_URL}"
            echo "task_url=${TASK_URL}" >> $GITHUB_OUTPUT

            if [ -n "$ASANA_COLLABORATOR_IDS" ]; then
              IFS=',' read -ra COLLABS <<< "$ASANA_COLLABORATOR_IDS"
              FOLLOWERS_JSON=$(printf '"%s",' "${COLLABS[@]}" | sed 's/,$//')
              curl -s -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/addFollowers" \
                -H "Authorization: Bearer ${ASANA_ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"data\": {\"followers\": [${FOLLOWERS_JSON}]}}" > /dev/null
              echo "✓ Collaborators added"
            fi
          fi

      - name: Slack notification
        if: always() && inputs.do_slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          SLACK_ANDROID_DOWNLOAD_URL: ${{ vars.SLACK_ANDROID_DOWNLOAD_URL }}
          APP_NAME: ${{ vars.APP_NAME }}
          VERSION_FULL: ${{ steps.version.outputs.full }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          BRANCH: ${{ github.ref_name }}
          ANDROID_TASK_URL: ${{ steps.asana_android.outputs.task_url }}
          IOS_TASK_URL: ${{ steps.asana_ios.outputs.task_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ANDROID_RESULT="${{ needs.android.result }}"
          IOS_RESULT="${{ needs.ios.result }}"

          PLATFORMS=""
          ALL_SUCCESS=true

          if [ "$ANDROID_RESULT" != "skipped" ]; then
            if [ "$ANDROID_RESULT" = "success" ]; then
              PLATFORMS="Android"
            else
              PLATFORMS="Android :x:"
              ALL_SUCCESS=false
            fi
          fi

          if [ "$IOS_RESULT" != "skipped" ]; then
            if [ "$IOS_RESULT" = "success" ]; then
              IOS_LABEL="iOS"
            else
              IOS_LABEL="iOS :x:"
              ALL_SUCCESS=false
            fi
            if [ -n "$PLATFORMS" ]; then
              PLATFORMS="${PLATFORMS} + ${IOS_LABEL}"
            else
              PLATFORMS="${IOS_LABEL}"
            fi
          fi

          if [ "$ALL_SUCCESS" = "true" ]; then
            MESSAGE="Hello <!channel>\n:white_check_mark: *${APP_NAME} — ${PLATFORMS}*\n\n:package: Version: ${VERSION_FULL} (${VERSION_CODE})\n:herb: Branch: ${BRANCH}\n:memo: Release Details\n• ${RELEASE_NOTES}"

            if [ "$ANDROID_RESULT" = "success" ]; then
              ANDROID_LINE="\n\n:robot_face: Android → Play Store internal track"
              if [ -n "$SLACK_ANDROID_DOWNLOAD_URL" ]; then
                ANDROID_LINE="${ANDROID_LINE} | <${SLACK_ANDROID_DOWNLOAD_URL}|Download>"
              fi
              MESSAGE="${MESSAGE}${ANDROID_LINE}"
            fi

            if [ "$IOS_RESULT" = "success" ]; then
              MESSAGE="${MESSAGE}\n:apple: iOS → TestFlight"
            fi

            if [ -n "$ANDROID_TASK_URL" ]; then
              MESSAGE="${MESSAGE}\n:pushpin: Android QA: <${ANDROID_TASK_URL}|View task>"
            fi
            if [ -n "$IOS_TASK_URL" ]; then
              MESSAGE="${MESSAGE}\n:pushpin: iOS QA: <${IOS_TASK_URL}|View task>"
            fi
          else
            MESSAGE="Hello <!channel>\n:x: *${APP_NAME} — Build failed (${PLATFORMS})*\n\n:package: Version: ${VERSION_FULL} (${VERSION_CODE})\n:herb: Branch: ${BRANCH}\n:mag: <${RUN_URL}|View logs>"
          fi

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${SLACK_CHANNEL_ID}\",
              \"text\": \"${MESSAGE}\"
            }" > /dev/null
          echo "✓ Slack notification sent"
