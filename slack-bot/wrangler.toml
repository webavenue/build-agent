# Cloudflare Worker config for the /build Slack slash-command bot.
#
# Plain vars live here. Secrets are set via `wrangler secret put <NAME>`
# (or in the Cloudflare dashboard) and never committed:
#
#   SLACK_SIGNING_SECRET   Slack app "Signing Secret" (Basic Information page)
#   GITHUB_TOKEN           PAT or fine-grained token with `actions:write`
#                          on every repo listed in CHANNEL_MAP
#   CHANNEL_MAP            JSON map of Slack channel_id → "owner/repo", e.g.
#                          {"C0123ABC":"webavenue/flight-manager",
#                           "C0456DEF":"webavenue/golf-tycoon"}

name = "build-agent-slack-bot"
main = "src/index.ts"
compatibility_date = "2025-05-01"

[vars]
WORKFLOW_FILE = "build.yml"
DEFAULT_REF = "main"

[observability]
enabled = true
